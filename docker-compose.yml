services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tmrp
      POSTGRES_PASSWORD: tmrp
      POSTGRES_DB: tmrp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmrp"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI 後端 ──
  api:
    build: ./tutor-platform-api
    env_file: ./tutor-platform-api/.env.docker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs
    # 顯式定義 healthcheck（覆寫 Dockerfile 中的設定，確保 docker-compose
    # 的 condition: service_healthy 行為可預期）
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Huey 任務佇列 Worker ──
  worker:
    build: ./tutor-platform-api
    env_file: ./tutor-platform-api/.env.docker
    command: huey_consumer app.worker.huey
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs

  # ── Vue 前端（nginx）──
  web:
    build:
      context: ./tutor-platform-web
      args:
        # 故意傳入空字串：所有前端 API 呼叫已含 /api/ 前綴，搭配空 baseURL
        # 會送出相對路徑（例：/api/auth/login），由本容器內的 nginx 代理至
        # api:8000。請勿改為 "/api"（會導致路徑變成 /api/api/...）或
        # http://api:8000（瀏覽器無法解析容器主機名）。
        VITE_API_BASE_URL: ""
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  pgdata:
  api-data:
  api-logs:
