secrets:
  db_password:
    file: ./secrets/db_password.txt
  # CRITICAL-1: JWT signing key + bootstrap admin password live in Docker
  # secrets (not .env.docker) so they never enter the git-tracked surface.
  jwt_secret_key:
    file: ./secrets/jwt_secret_key.txt
  # Optional — only mount during a rotation window. Remove the file (and the
  # `- jwt_secret_key_previous` entries below) once the old access-token TTL
  # window has passed and no in-flight tokens need verification.
  jwt_secret_key_previous:
    file: ./secrets/jwt_secret_key_previous.txt
  admin_password:
    file: ./secrets/admin_password.txt

services:
  # ── PostgreSQL ──
  db:
    # MEDIUM-10: pin by @sha256 digest in production — see ./scripts/pin-base-images.sh.
    image: postgres:16-alpine@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    restart: on-failure
    # Listen on the uncommon port 41432 instead of the default 5432. Postgres
    # prepends `postgres` when the command starts with a flag, so the args
    # below run as `postgres -p 41432`.
    command: ["-p", "41432"]
    # HIGH-5: drop all Linux capabilities + block capability regain via
    # setuid/setgid binaries. Postgres binds no privileged port and runs
    # fine without caps; the official alpine image already drops to UID 70
    # (`postgres`) for the server itself, but declaring it here also covers
    # the entrypoint shell so nothing in the container runs as root.
    user: "70:70"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    secrets:
      - db_password
    environment:
      # SEC-H04: password is read from Docker secret file, not env var.
      # The postgres image reads POSTGRES_PASSWORD_FILE at startup.
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in repo-root .env (see .env.example)}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set in repo-root .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    # HIGH-5: the host port binding moved to docker-compose.override.yml so
    # `docker compose -f docker-compose.yml up` (production invocation) never
    # publishes 41432 to the host. The override file is auto-loaded by local
    # `docker compose up`, preserving dev ergonomics.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -p 41432"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── FastAPI 後端 ──
  api:
    build: ./tutor-platform-api
    restart: on-failure
    # HIGH-5: same container hardening as `db`. The api image already runs
    # as non-root (see Dockerfile USER directive) and needs no extra caps.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    secrets:
      - db_password
      - jwt_secret_key
      - jwt_secret_key_previous
      - admin_password
    env_file: ./tutor-platform-api/.env.docker
    environment:
      # SEC-H04: docker-entrypoint.sh reads /run/secrets/db_password and
      # constructs DATABASE_URL at runtime — password never appears in env.
      DB_USER: ${DB_USER:?DB_USER must be set in repo-root .env}
      DB_HOST: db
      DB_NAME: ${DB_NAME:?DB_NAME must be set in repo-root .env}
      # MEDIUM-2: trust XFF only from the pinned web sidecar. WEB_IP defaults
      # to 172.28.0.10 and must match the ipv4_address assigned below; both
      # references use the same ${WEB_IP} variable so a subnet change stays
      # consistent without a separate manual edit to this line.
      FORWARDED_ALLOW_IPS: "127.0.0.1,${WEB_IP:-172.28.0.10}"
    networks:
      appnet:
        ipv4_address: 172.28.0.20
    depends_on:
      db:
        condition: service_healthy
    # I-01: no ports: block here — the raw FastAPI backend must never be
    # reachable from the public internet. Dev binding (127.0.0.1:41000:41000)
    # lives in docker-compose.override.yml, which Docker auto-loads locally
    # but is NOT applied when CI/prod runs `docker compose -f docker-compose.yml up`.
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs
    # Explicit healthcheck — overrides the Dockerfile directive so compose's
    # condition: service_healthy behaves predictably regardless of image defaults.
    # start_period: 90s covers the initialize_database() DDL + seed on first boot.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:41000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Huey 任務佇列 Worker ──
  worker:
    build: ./tutor-platform-api
    restart: on-failure
    # HIGH-5: container hardening, mirrors the api service.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    secrets:
      - db_password
      # jwt_secret_key and admin_password are unused by the worker but
      # required by the shared Settings model; remove once config is split.
      - jwt_secret_key
      - admin_password
    env_file: ./tutor-platform-api/.env.docker
    environment:
      DB_USER: ${DB_USER:?DB_USER must be set in repo-root .env}
      DB_HOST: db
      DB_NAME: ${DB_NAME:?DB_NAME must be set in repo-root .env}
    command: huey_consumer app.worker.huey
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - appnet
    volumes:
      - api-data:/app/data
      - api-logs:/app/logs
    # Worker has no HTTP surface; probe that the data dir is writable.
    # Avoid probing huey.db directly: SqliteHuey opens the file lazily on
    # first storage op, so it may not exist for the first few seconds.
    # If the consumer process itself dies, huey_consumer is the container's
    # PID 1 — Docker will exit the container and `restart: on-failure` kicks
    # in, so we don't need a separate liveness probe.
    healthcheck:
      test: ["CMD-SHELL", "test -w /app/data || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Vue 前端（nginx）──
  web:
    build:
      context: ./tutor-platform-web
      args:
        # Intentionally empty string: all frontend API calls already carry the
        # /api/ prefix, so an empty baseURL emits relative paths (e.g.,
        # /api/auth/login) which nginx inside this container proxies to api:41000.
        # Do NOT change to "/api" (path becomes /api/api/...) or
        # http://api:41000 (browsers cannot resolve container hostnames).
        VITE_API_BASE_URL: ""
    restart: on-failure
    # HIGH-5: container hardening. nginx-unprivileged binds port 41080 (non-privileged),
    # so dropping NET_BIND_SERVICE along with everything else is safe.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    depends_on:
      api:
        condition: service_healthy
    networks:
      appnet:
        # MEDIUM-2: pinned IP so the api service can list this single hop
        # in FORWARDED_ALLOW_IPS (uvicorn has no CIDR matching). Must match
        # the WEB_IP default in the api service's FORWARDED_ALLOW_IPS above.
        ipv4_address: ${WEB_IP:-172.28.0.10}
    ports:
      # H-03: In production, this service MUST sit behind a TLS-terminating
      # reverse proxy (e.g. Caddy, Traefik, or a cloud load balancer).
      # Auth cookies carry the Secure flag and will not be sent over plain HTTP.
      # Default host port is the uncommon 41080 (not 80) so the optional caddy
      # profile below can bind 80/443 without a manual ``WEB_PORT`` override and
      # so the default non-TLS dev binding stays out of privileged-port territory.
      # Override with ``WEB_PORT=80`` when running the bare web service on
      # a host without caddy.
      - "${WEB_PORT:-41080}:41080"
    healthcheck:
      # Probe 127.0.0.1, not localhost: nginx-unprivileged runs as UID 101 and
      # cannot rewrite the root-owned default.conf, so the base image's
      # 10-listen-on-ipv6-by-default.sh is a no-op and nginx binds IPv4 only.
      # `localhost` resolves to ::1 first inside the container -> connection
      # refused. 127.0.0.1 matches the actual 0.0.0.0:41080 bind.
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:41080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  # H-03: Optional TLS-terminating reverse proxy. Enable with the `tls`
  # profile and set DOMAIN in the repo-root .env (the Compose variable
  # interpolation source — NOT .env.docker, which only feeds containers):
  #   docker-compose --profile tls up -d
  # Caddy obtains and renews Let's Encrypt certificates automatically.
  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    # DOMAIN is interpolated for the whole file even when the tls profile is
    # off, so a `:-` default (not `:?`) is required — otherwise a plain
    # `docker-compose up` would fail on this optional service. Set DOMAIN in
    # the repo-root .env before enabling the tls profile in production.
    command: caddy reverse-proxy --from ${DOMAIN:-localhost} --to web:41080
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      appnet:
        # Pinned IP so nginx can trust X-Forwarded-Proto only from this hop
        # (see tutor-platform-web/nginx.conf — geo $trusted_proxy block).
        # Without a pin, the value of $remote_addr inside the web container
        # would also match Docker NAT clients, defeating the trust check.
        ipv4_address: 172.28.0.30
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  pgdata:
  api-data:
  api-logs:
  caddy-data:
  caddy-config:

# MEDIUM-2: custom bridge with a known subnet so the api service can list the
# nginx sidecar's fixed IP in FORWARDED_ALLOW_IPS. Also gives us a foothold
# for future network segmentation (e.g. a separate db-only network).
networks:
  appnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
