# Security headers shared by every location that calls `add_header`.
#
# nginx rule: if a `location` block contains any `add_header`, it DROPS every
# `add_header` inherited from the server block. So any location that sets
# Cache-Control (for example) must re-emit the full security-header set.
# This file is the single source of truth — included at the server scope and
# re-included by each location that adds its own headers.
#
# Keep this file in lockstep with the top-level server block in nginx.conf;
# any new header must be added in both places (server-scope for the default
# inheritance path, and this include for locations that override).

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Permitted-Cross-Domain-Policies "none" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
