# nginx-unprivileged 預設以 nginx (uid 101) 身分執行，必須監聽 >=1024 的埠。
# 對外的 80 由 docker-compose 的 ports 映射處理。
server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── 全域安全標頭 (always = 即使 4xx/5xx 也送出) ──
    # FastAPI 的 SecurityHeadersMiddleware 只覆蓋 /api/*，靜態資源亦需。
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── 壓縮 ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # ── 邊緣速率限制：粗略保護 /api/ 不被打爆，後端有更精細的 RateLimitMiddleware ──
    # zone 宣告本應在 http {} 下；nginx-unprivileged 預設 nginx.conf 透過 conf.d 引入，
    # 此 server 只能用既有 zone。如要啟用請於 /etc/nginx/nginx.conf 加上：
    #   limit_req_zone $binary_remote_addr zone=api_edge:10m rate=20r/s;
    # 並於下方 /api/ 區塊取消註解：limit_req zone=api_edge burst=40 nodelay;

    # API 反向代理
    # ⚠️ proxy_pass 結尾故意「不加斜線」，原樣保留 /api/ 前綴：
    #   後端所有路由皆以 /api/ 為前綴（如 /api/auth/login），加上斜線會
    #   變成路徑剝離模式，請求會被改寫為 /auth/login → 後端 404。
    location /api/ {
        # limit_req zone=api_edge burst=40 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康檢查也代理
    location /health {
        proxy_pass http://api:8000;
    }

    # ── 拒絕對 dotfile 的存取（.git/、.env 等不慎佈署亦可防外洩） ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA 入口：禁止快取，避免新版發佈後使用者拿到舊的 index.html
    # 進而載入早已被指紋化重新命名的 /assets/* 而 404。
    # ⚠️ nginx 的 add_header 在 location 中只要出現一次，就會「丟掉所有」server
    # 區塊繼承來的 add_header。下方四個全域標頭必須在每個用了 add_header 的
    # location 中重複宣告，否則靜態資源就會缺安全標頭。
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # SPA fallback：非檔案請求都回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取（vite 已對檔名做指紋，內容變更會換新檔名 → 安全長快取）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }
}
