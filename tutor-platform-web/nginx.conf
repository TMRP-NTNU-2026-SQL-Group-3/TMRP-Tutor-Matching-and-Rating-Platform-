# nginx-unprivileged 預設以 nginx (uid 101) 身分執行，必須監聽 >=1024 的埠。
# 對外的 80 由 docker-compose 的 ports 映射處理。

# I-02: edge-layer rate limit zone. This file lands at
# /etc/nginx/conf.d/default.conf, which the base image's nginx.conf pulls in
# from inside the `http {}` block — so `limit_req_zone` placed here (above
# any `server {}`) is in the correct context. 10 MB of shared state tracks
# ~160k distinct client IPs at 20 req/s sustained; burst=40 absorbs short
# spikes from the SPA's parallel XHRs without rejecting normal users. This
# is the first gate before requests reach FastAPI's RateLimitMiddleware.
limit_req_zone $binary_remote_addr zone=api_edge:10m rate=20r/s;

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── Global security headers ──
    # Shared snippet — see nginx-security-headers.conf. Because any location
    # block that calls `add_header` drops inherited server-scope headers,
    # every such location below re-includes this file to keep the header
    # set in lockstep.
    include /etc/nginx/snippets/security-headers.conf;

    # ── 壓縮 ──
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # ── 邊緣速率限制：粗略保護 /api/ 不被打爆，後端有更精細的 RateLimitMiddleware ──
    # I-02: zone 定義在檔案最上方（http 作用域），此處直接套用即可。
    # burst=40 nodelay 允許瞬間爆量但不延遲通過的請求，超量者會以 503 拒絕。

    # API 反向代理
    # ⚠️ proxy_pass 結尾故意「不加斜線」，原樣保留 /api/ 前綴：
    #   後端所有路由皆以 /api/ 為前綴（如 /api/auth/login），加上斜線會
    #   變成路徑剝離模式，請求會被改寫為 /auth/login → 後端 404。
    location /api/ {
        limit_req zone=api_edge burst=40 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # MEDIUM-3: overwrite (not append) XFF. $proxy_add_x_forwarded_for
        # would forward whatever the client sent, letting an attacker spoof
        # the origin IP seen by the backend's rate limiter and audit log.
        # This container is the single trusted hop in front of the API, so
        # using $remote_addr pins XFF to the real peer address.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康檢查也代理
    location /health {
        proxy_pass http://api:8000;
    }

    # ── 拒絕對 dotfile 的存取（.git/、.env 等不慎佈署亦可防外洩） ──
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # SPA 入口：禁止快取，避免新版發佈後使用者拿到舊的 index.html
    # 進而載入早已被指紋化重新命名的 /assets/* 而 404。
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # SPA fallback：非檔案請求都回傳 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 靜態資源快取（vite 已對檔名做指紋，內容變更會換新檔名 → 安全長快取）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
    }
}
