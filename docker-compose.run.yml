# WARNING: LOCAL DEVELOPMENT ONLY — NEVER USE IN PRODUCTION
# This file sets DEBUG=true (exposes /docs, /redoc, /openapi.json) and
# COOKIE_SECURE=false (auth cookies sent in cleartext). Applying it against a
# public-facing deployment is a critical security misconfiguration.
#
# Ad-hoc override: drops port bindings so the stack runs alongside a local
# Postgres + FastAPI dev server. Port 80 (web) stays as-is.
# Invoke with:  docker compose -f docker-compose.yml -f docker-compose.run.yml up -d
services:
  api:
    ports: !reset []
    environment:
      DEBUG: "true"
      COOKIE_SECURE: "false"
      CORS_ORIGINS: "http://localhost,http://localhost:80"
      ALLOW_DEBUG: "true"
  worker:
    environment:
      DEBUG: "true"
      COOKIE_SECURE: "false"
      CORS_ORIGINS: "http://localhost,http://localhost:80"
      ALLOW_DEBUG: "true"
