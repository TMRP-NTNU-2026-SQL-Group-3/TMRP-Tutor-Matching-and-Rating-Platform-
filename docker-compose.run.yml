# WARNING: LOCAL DEVELOPMENT ONLY — NEVER USE IN PRODUCTION
# This file sets DEBUG=true (exposes /docs, /redoc, /openapi.json) and
# COOKIE_SECURE=false (auth cookies sent in cleartext). Applying it against a
# public-facing deployment is a critical security misconfiguration.
#
# Ad-hoc override: drops port bindings so the stack runs alongside a local
# Postgres + FastAPI dev server. The web port (41080) stays as-is.
# Invoke with:  docker compose -f docker-compose.yml -f docker-compose.run.yml up -d
services:
  api:
    ports: !reset []
    environment:
      DEBUG: "true"
      COOKIE_SECURE: "false"
      CORS_ORIGINS: "http://localhost:41080"
      ALLOW_DEBUG: "true"
      # The base compose caps the api container at 512M (deploy.resources).
      # The Dockerfile defaults to 4 uvicorn workers, which can exceed that cap
      # on a demo machine and get the container OOM-killed before it ever turns
      # healthy — leaving the web sidecar (depends_on api: healthy) stuck and
      # http://localhost:41080 unreachable. A single worker is ample for a demo
      # and keeps memory comfortably under the limit.
      UVICORN_WORKERS: "1"
  worker:
    environment:
      DEBUG: "true"
      ALLOW_DEBUG: "true"
